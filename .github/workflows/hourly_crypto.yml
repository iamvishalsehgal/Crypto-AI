name: Hourly Crypto Trading

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      cycles:
        description: "Number of trading cycles"
        default: "5"
        type: string
      symbols:
        description: "Crypto symbols (space-separated)"
        default: "BTC/USDT ETH/USDT"
        type: string

permissions:
  contents: write

jobs:
  crypto:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-hourly-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-hourly-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crypto trading
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          EXCHANGE_API_SECRET: ${{ secrets.EXCHANGE_API_SECRET }}
          EXCHANGE_SANDBOX_MODE: "true"
        run: |
          python scripts/auto_trader.py \
            --asset-types crypto \
            --symbols ${{ github.event.inputs.symbols || 'BTC/USDT ETH/USDT' }} \
            --cycles ${{ github.event.inputs.cycles || '5' }} \
            --interval 60 \
            --commit-interval 999

      - name: Commit reports
        if: always()
        run: |
          git config user.name "OmniTrade Bot"
          git config user.email "bot@omnitrade.local"
          git add reports/ || true
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "bot: hourly crypto report — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin master
          fi
