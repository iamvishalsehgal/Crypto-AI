name: Daily All-Lane Trading

on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:
    inputs:
      cycles:
        description: "Number of trading cycles per lane"
        default: "3"
        type: string

permissions:
  contents: write

jobs:
  all_lanes:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-daily-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-daily-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all-lane trading
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          EXCHANGE_API_SECRET: ${{ secrets.EXCHANGE_API_SECRET }}
          EXCHANGE_SANDBOX_MODE: "true"
          STOCK_ALPACA_API_KEY: ${{ secrets.STOCK_ALPACA_API_KEY }}
          STOCK_ALPACA_API_SECRET: ${{ secrets.STOCK_ALPACA_API_SECRET }}
          BETTING_ODDS_API_KEY: ${{ secrets.BETTING_ODDS_API_KEY }}
        run: |
          python scripts/auto_trader.py \
            --asset-types crypto stock bet \
            --cycles ${{ github.event.inputs.cycles || '3' }} \
            --interval 120 \
            --commit-interval 999

      - name: Health check
        if: always()
        run: |
          python -c "
          from omnitrade.execution.asset_router import AssetRouter
          from omnitrade.monitoring.health_check import HealthChecker
          from omnitrade.config.settings import settings
          router = AssetRouter(settings=settings, mode='paper')
          hc = HealthChecker(settings)
          resp = hc.get_health_response(lane_status=router.get_status()['lane_status'])
          print('Health:', resp['overall'], '| HTTP:', resp['http_status'])
          print('Lanes:', resp['lanes'])
          print('System:', resp['system'])
          "

      - name: Commit reports
        if: always()
        run: |
          git config user.name "OmniTrade Bot"
          git config user.email "bot@omnitrade.local"
          git add reports/ logs/ || true
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "bot: daily all-lane report — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin master
          fi
