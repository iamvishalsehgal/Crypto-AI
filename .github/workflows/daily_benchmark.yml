name: Daily Learn + Tune + Trade

on:
  # Run once a day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (test everything but don't commit)"
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_learning:
        description: "Skip model training (only tune + trade)"
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-daily-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-daily-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@crypto-ai.local"

      # Step 1: Self-learning — train models on real data
      - name: "Step 1: Learn — train ML models on real data"
        if: ${{ github.event.inputs.skip_learning != 'true' }}
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          EXCHANGE_API_SECRET: ${{ secrets.EXCHANGE_API_SECRET }}
          EXCHANGE_SANDBOX_MODE: "true"
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python scripts/auto_learner.py --epochs 50 $FLAGS

      # Step 2: Auto-tune signal parameters
      - name: "Step 2: Tune — optimize signal parameters"
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          EXCHANGE_API_SECRET: ${{ secrets.EXCHANGE_API_SECRET }}
          EXCHANGE_SANDBOX_MODE: "true"
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python scripts/auto_tuner.py --variants 30 $FLAGS

      # Step 3: Paper trade with real data, log results
      - name: "Step 3: Trade — paper trade with real data and log results"
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          EXCHANGE_API_SECRET: ${{ secrets.EXCHANGE_API_SECRET }}
          EXCHANGE_SANDBOX_MODE: "true"
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python scripts/benchmark_runner.py $FLAGS
