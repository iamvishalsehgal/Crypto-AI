name: Autonomous Trading Bot

on:
  # Run every hour
  schedule:
    - cron: "0 * * * *"
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      cycles:
        description: "Number of trading cycles to run"
        default: "5"
        type: string

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-trade-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-trade-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trading bot
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          EXCHANGE_API_SECRET: ${{ secrets.EXCHANGE_API_SECRET }}
          EXCHANGE_SANDBOX_MODE: "true"
        run: |
          python scripts/auto_trader.py \
            --cycles ${{ github.event.inputs.cycles || '5' }} \
            --interval 60 \
            --commit-interval 999

      - name: Commit & push trading reports
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@crypto-ai.local"
          git add reports/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "bot: trading report — ${TIMESTAMP}"
            git push origin master
          fi
