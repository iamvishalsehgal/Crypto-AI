version: "3.9"

services:
  # -------------------------------------------------------------------
  # Core trading bot
  # -------------------------------------------------------------------
  trading-bot:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: crypto-trading-bot
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_started
    restart: unless-stopped
    networks:
      - bot-network

  # -------------------------------------------------------------------
  # MongoDB for OHLCV, trades, model metrics, etc.
  # -------------------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: crypto-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    networks:
      - bot-network

  # -------------------------------------------------------------------
  # Prometheus -- scrapes the bot's /metrics endpoint
  # -------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: crypto-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - trading-bot
    restart: unless-stopped
    networks:
      - bot-network

  # -------------------------------------------------------------------
  # Grafana -- dashboards backed by Prometheus
  # -------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: crypto-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  mongodb-data:
  grafana-data:
  prometheus-data:
