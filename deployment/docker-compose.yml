version: "3.9"

services:
  # -------------------------------------------------------------------
  # OmniTrade AI — multi-asset autonomous trading bot
  # -------------------------------------------------------------------
  omnitrade-bot:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: omnitrade-bot
    env_file:
      - ../.env
    environment:
      - EXCHANGE_API_KEY=${EXCHANGE_API_KEY:-}
      - EXCHANGE_API_SECRET=${EXCHANGE_API_SECRET:-}
      - STOCK_ALPACA_API_KEY=${STOCK_ALPACA_API_KEY:-}
      - STOCK_ALPACA_API_SECRET=${STOCK_ALPACA_API_SECRET:-}
      - BETTING_ODDS_API_KEY=${BETTING_ODDS_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_started
    restart: unless-stopped
    networks:
      - omnitrade-network

  # -------------------------------------------------------------------
  # MongoDB — OHLCV, trades, model metrics, stock & betting data
  # -------------------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: omnitrade-mongodb
    ports:
      - "27017:27017"
    volumes:
      - omnitrade-mongo-data:/data/db
    restart: unless-stopped
    networks:
      - omnitrade-network

  # -------------------------------------------------------------------
  # Prometheus — scrapes the bot's /metrics endpoint
  # -------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: omnitrade-prometheus
    ports:
      - "9090:9090"
    volumes:
      - omnitrade-prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - omnitrade-bot
    restart: unless-stopped
    networks:
      - omnitrade-network

  # -------------------------------------------------------------------
  # Grafana — dashboards backed by Prometheus
  # -------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: omnitrade-grafana
    ports:
      - "3000:3000"
    volumes:
      - omnitrade-grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - omnitrade-network

networks:
  omnitrade-network:
    driver: bridge

volumes:
  omnitrade-mongo-data:
  omnitrade-grafana-data:
  omnitrade-prometheus-data:
